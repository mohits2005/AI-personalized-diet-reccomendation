<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NutriNavigator AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
}
</style>

</head>

<body class="bg-gradient-to-br from-green-100 via-white to-green-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-4xl">

<h1 class="text-4xl font-bold text-center text-green-700 mb-2">
🥗 NutriNavigator AI
</h1>

<p class="text-center text-gray-500 mb-8">
Personalized Diet • Restaurant • Workout Recommendations
</p>

<form action="/recommend" method="post" class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>
<label class="block font-semibold mb-1">Age</label>
<input type="number" name="age" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-green-400">
</div>

<div>
<label class="block font-semibold mb-1">Gender</label>
<select name="gender" class="w-full border rounded-lg p-2">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div>
<label class="block font-semibold mb-1">Weight (kg)</label>
<input type="number" name="weight" class="w-full border rounded-lg p-2">
</div>

<div>
<label class="block font-semibold mb-1">Height (m)</label>
<input type="text" name="height" class="w-full border rounded-lg p-2">
</div>

<div>
<label class="block font-semibold mb-1">Veg / Non-Veg</label>
<select name="veg_or_nonveg" class="w-full border rounded-lg p-2">
<option value="veg">Vegetarian</option>
<option value="nonveg">Non-Veg</option>
</select>
</div>

<div>
<label class="block font-semibold mb-1">Disease</label>
<input type="text" name="disease" class="w-full border rounded-lg p-2">
</div>

<div>
<label class="block font-semibold mb-1">Region</label>
<input type="text" name="region" class="w-full border rounded-lg p-2">
</div>

<div>
<label class="block font-semibold mb-1">Allergics</label>
<input type="text" name="allergics" class="w-full border rounded-lg p-2">
</div>

<div class="md:col-span-2">
<label class="block font-semibold mb-1">Food Preference</label>
<input type="text" name="foodtype" class="w-full border rounded-lg p-2">
</div>

<div class="md:col-span-2 text-center mt-4">

<button
type="submit"
class="bg-green-600 hover:bg-green-700 text-white text-lg px-8 py-3 rounded-xl shadow-lg transition duration-200">

Get AI Recommendations 🚀

</button>

</div>

</form>

</div>

</body>
</html>
